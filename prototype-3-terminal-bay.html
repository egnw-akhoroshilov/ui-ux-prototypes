<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1366"/>
<title>Prototype 3 — Terminal Bay · AI Pricing Workstation</title>
<link rel="stylesheet" href="vendor/base.css"/>
<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="vendor/material-ui.production.min.js"></script>
<script src="vendor/babel.min.js"></script>
<style>
  .scanlines {
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 4px);
  }
  @keyframes blink { 50% { opacity: .25; } }
  .led-blink { animation: blink 1s step-end infinite; }
</style>
</head>
<body>
<div id="app"></div>
<script type="text/babel">
const {
  Box, Paper, Stack, Button, Typography, Chip, Alert, Divider,
  LinearProgress, CircularProgress, Icon, ThemeProvider, createTheme, CssBaseline, Snackbar
} = MaterialUI;
const { useState, useRef } = React;

const C = {
  bg:'#1b2125', panel:'#242c31', panel2:'#2c353b', text:'#ECEFF1', dim:'#90A4AE',
  border:'rgba(255,255,255,0.14)', blue:'#42A5F5', green:'#66BB6A', greenDark:'#429a45',
  amber:'#FFA726', amberDark:'#ed6c02', red:'#EF5350', redDark:'#b94646'
};

const theme = createTheme({
  palette: {
    mode:'dark',
    primary:{ main:C.blue }, success:{ main:C.green }, warning:{ main:C.amber }, error:{ main:C.red },
    background:{ default:C.bg, paper:C.panel }, text:{ primary:C.text, secondary:C.dim }
  },
  typography: { fontFamily:'Roboto, Arial, Helvetica, sans-serif' },
  shape: { borderRadius: 2 },
  components: { MuiButton:{ styleOverrides:{ root:{ minHeight:56, fontWeight:700, letterSpacing:'0.06em' } } } }
});

const SUG = {
  title: "KitchenAid Stand Mixer 5-Qt — Empire Red, Tested",
  desc: "Artisan series 5-quart tilt-head stand mixer. All speeds work, bowl and flat beater included. Minor scratches on base.",
  dept: "Housewares", cat: "Small Appliances", price: "139.00", action: "SEND TO E-COMM"
};

function Led({on, color, label}) {
  return (
    <Stack direction="row" spacing={.8} alignItems="center">
      <Box className={on?'led-blink':''} sx={{ width:14, height:14, borderRadius:'50%',
        bgcolor: on?color:'#455A64', boxShadow: on?`0 0 8px ${color}`:'none', border:'1px solid rgba(0,0,0,.4)' }}/>
      <Typography sx={{ fontSize:12, fontWeight:700, letterSpacing:'0.1em', color: on?color:C.dim }}>{label}</Typography>
    </Stack>
  );
}

function ModeTiles({state, fbDone}) {
  const tiles = [
    { n:'01', icon:'camera_alt', label:'CAPTURE' },
    { n:'02', icon:'memory', label:'ANALYZE' },
    { n:'03', icon:'rate_review', label:'REVIEW' },
    { n:'04', icon:'task_alt', label:'ACTION' }
  ];
  const active = state===2 && fbDone ? 3 : state;
  return (
    <Stack direction="row" spacing={1.2} sx={{ px:1.5, py:1.2 }}>
      {tiles.map((t,i)=>{
        const done=i<active, cur=i===active;
        const col = cur?C.blue : done?C.green : '#455A64';
        return (
          <Paper key={t.n} variant="outlined" sx={{ flex:1, px:1.5, py:.8, display:'flex', alignItems:'center', gap:1.2,
            bgcolor: cur?'rgba(66,165,245,.15)': done?'rgba(102,187,106,.1)':C.panel,
            borderColor:col, borderWidth:2, position:'relative', overflow:'hidden' }}>
            <Typography sx={{ fontSize:26, fontWeight:700, color:col, fontVariantNumeric:'tabular-nums' }}>{t.n}</Typography>
            <Box sx={{ minWidth:0 }}>
              <Stack direction="row" spacing={.6} alignItems="center">
                <Icon sx={{ fontSize:18, color:col }}>{done?'check_circle':t.icon}</Icon>
                <Typography noWrap sx={{ fontSize:15, fontWeight:700, color: cur||done?C.text:C.dim, letterSpacing:'0.06em' }}>{t.label}</Typography>
              </Stack>
              <Typography noWrap sx={{ fontSize:11.5, fontWeight:700, color:col, letterSpacing:'0.08em' }}>
                {cur?'● ACTIVE':done?'DONE':'STANDBY'}
              </Typography>
            </Box>
          </Paper>
        );
      })}
    </Stack>
  );
}

function VotePanel({label, text, vote, onVote, big}) {
  const col = vote==='up'?C.green : vote==='down'?C.red : C.amber;
  return (
    <Paper variant="outlined" sx={{ borderColor:col, borderWidth:2, bgcolor:C.panel2, display:'flex', overflow:'hidden' }}>
      <Box sx={{ flex:1, minWidth:0, p:1.5 }}>
        <Stack direction="row" spacing={1} alignItems="center" sx={{ mb:.4 }}>
          <Typography noWrap sx={{ fontSize:12.5, fontWeight:700, color:col, letterSpacing:'0.12em' }}>{label}</Typography>
          <Chip size="small" label={vote==='up'?'APPROVED':vote==='down'?'REJECTED':'REVIEW REQUIRED'}
            icon={<Icon sx={{ fontSize:'15px !important', color:'#0c0f11 !important' }}>{vote==='up'?'thumb_up':vote==='down'?'thumb_down':'priority_high'}</Icon>}
            sx={{ bgcolor:col, color:'#0c0f11', fontWeight:700, height:22, fontSize:11 }}/>
        </Stack>
        <Typography sx={{ fontSize: big?19:15, fontWeight: big?700:400, color:C.text,
          display:'-webkit-box', WebkitLineClamp: big?1:2, WebkitBoxOrient:'vertical', overflow:'hidden' }}>{text}</Typography>
      </Box>
      <Stack direction="row" sx={{ flexShrink:0 }}>
        <Button onClick={()=>onVote('up')} aria-label={`Approve ${label}`}
          sx={{ width:78, borderRadius:0, flexDirection:'column', gap:.2, fontSize:11.5, height:'100%',
            bgcolor: vote==='up'?C.green:'transparent', color: vote==='up'?'#0c0f11':C.green,
            borderLeft:`2px solid ${col}`, '&:hover':{ bgcolor: vote==='up'?C.green:'rgba(102,187,106,.15)' } }}>
          <Icon>thumb_up</Icon>GOOD
        </Button>
        <Button onClick={()=>onVote('down')} aria-label={`Reject ${label}`}
          sx={{ width:78, borderRadius:0, flexDirection:'column', gap:.2, fontSize:11.5, height:'100%',
            bgcolor: vote==='down'?C.red:'transparent', color: vote==='down'?'#0c0f11':C.red,
            borderLeft:`2px solid ${col}`, '&:hover':{ bgcolor: vote==='down'?C.red:'rgba(239,83,80,.15)' } }}>
          <Icon>thumb_down</Icon>BAD
        </Button>
      </Stack>
    </Paper>
  );
}

function App() {
  const [state, setState] = useState(0);
  const [photos, setPhotos] = useState(0);
  const [fb, setFb] = useState({ title:null, desc:null });
  const [snack, setSnack] = useState(null);
  const [done, setDone] = useState(false);
  const timer = useRef(null);
  const fbDone = fb.title && fb.desc;

  const goto = (i) => {
    clearTimeout(timer.current); setDone(false); setSnack(null);
    if (i===0) { setState(0); setPhotos(0); setFb({title:null,desc:null}); }
    if (i===1) { setState(1); setPhotos(2); setFb({title:null,desc:null}); timer.current=setTimeout(()=>setState(2),3500); }
    if (i===2) { setState(2); setPhotos(2); setFb({title:null,desc:null}); }
    if (i===3) { setState(2); setPhotos(2); setFb({title:'up',desc:'up'}); }
  };
  const status = state===0 ? (photos>0?['IMAGES CAPTURED',C.blue]:['READY',C.green])
    : state===1 ? ['ANALYZING',C.amber]
    : fbDone ? ['READY FOR ACTION',C.green] : ['FEEDBACK REQUIRED',C.amber];

  return (
    <ThemeProvider theme={theme}>
      <CssBaseline/>
      <Box className="ws-canvas scanlines" sx={{ display:'flex', flexDirection:'column', bgcolor:`${C.bg} !important` }}>
        <Stack direction="row" alignItems="center" spacing={2.5} sx={{ height:52, px:2, bgcolor:'#11161a', borderBottom:`2px solid ${C.border}`, flexShrink:0 }}>
          <Stack direction="row" spacing={1} alignItems="center">
            <Icon sx={{ color:C.amber, fontSize:26 }}>precision_manufacturing</Icon>
            <Typography noWrap sx={{ fontWeight:700, fontSize:17, letterSpacing:'0.12em', color:C.text }}>VISION PRICING TERMINAL · BAY 07</Typography>
          </Stack>
          <Divider orientation="vertical" flexItem sx={{ borderColor:C.border }}/>
          <Led on={state===0} color={C.green} label="READY"/>
          <Led on={state===1} color={C.amber} label="PROCESSING"/>
          <Led on={state===2&&!fbDone} color={C.amber} label="FEEDBACK"/>
          <Led on={state===2&&!!fbDone} color={C.green} label="ACTION OK"/>
          <Box sx={{ flex:1 }}/>
          <Chip label={status[0]} sx={{ bgcolor:status[1], color:'#0c0f11', fontWeight:700, fontSize:15, height:36, borderRadius:'2px' }}/>
          <Button onClick={()=>goto(0)} startIcon={<Icon>replay</Icon>}
            sx={{ color:C.text, border:`1px solid ${C.border}`, minHeight:40, px:2 }}>NEW ITEM</Button>
        </Stack>

        <ModeTiles state={state} fbDone={!!fbDone}/>

        <Stack direction="row" spacing={1.5} sx={{ flex:1, px:1.5, pb:1.5, minHeight:0 }}>
          <Paper variant="outlined" sx={{ width:438, display:'flex', flexDirection:'column', borderColor:C.border, overflow:'hidden', flexShrink:0 }}>
            <Stack direction="row" alignItems="center" spacing={1} sx={{ px:1.5, height:40, bgcolor:'#11161a' }}>
              <Icon sx={{ fontSize:18, color:C.dim }}>camera_alt</Icon>
              <Typography noWrap sx={{ fontSize:13, fontWeight:700, letterSpacing:'0.1em', color:C.dim }}>CAMERA FEED</Typography>
              <Chip size="small" label={state===0?'● LIVE':'FEED OFF'} sx={{ ml:'auto !important', height:22, fontWeight:700, fontSize:11,
                bgcolor: state===0?C.red:'#455A64', color: state===0?'#fff':'#B0BEC5' }}/>
            </Stack>
            <Box sx={{ flex:1, bgcolor:'#0c0f11', display:'flex', alignItems:'center', justifyContent:'center', position:'relative', minHeight:0 }}>
              {state===0 ? (
                <>
                  <svg width="200" height="150" viewBox="0 0 200 150">
                    <path d="M60 105 h80 v18 a8 8 0 0 1 -8 8 h-64 a8 8 0 0 1 -8 -8 z" fill="#3e4c54" stroke="#5c6f7a" strokeWidth="3"/>
                    <path d="M70 105 v-45 a18 18 0 0 1 18 -18 h30 a26 26 0 0 1 0 52 v11" fill="none" stroke="#5c6f7a" strokeWidth="9" strokeLinecap="round"/>
                    <rect x="52" y="22" width="40" height="16" rx="5" fill="#3e4c54" stroke="#5c6f7a" strokeWidth="3"/>
                  </svg>
                  {[0,1,2,3].map(i=>(
                    <Box key={i} sx={{ position:'absolute', top:i<2?10:'auto', bottom:i>=2?10:'auto', left:i%2===0?10:'auto', right:i%2===1?10:'auto',
                      width:26, height:26, borderTop:i<2?'3px solid #4FC3F7':'none', borderBottom:i>=2?'3px solid #4FC3F7':'none',
                      borderLeft:i%2===0?'3px solid #4FC3F7':'none', borderRight:i%2===1?'3px solid #4FC3F7':'none' }}/>
                  ))}
                  <Typography sx={{ position:'absolute', bottom:10, fontSize:13, color:C.dim, fontWeight:500 }}>Center item · good light · no hands in frame</Typography>
                </>
              ) : (
                <Stack alignItems="center" spacing={1} sx={{ color:'#546E7A' }}>
                  <Icon sx={{ fontSize:48 }}>videocam_off</Icon>
                  <Typography sx={{ fontSize:14, fontWeight:500 }}>Preview off after analysis starts</Typography>
                </Stack>
              )}
            </Box>
            <Stack direction="row" spacing={1} alignItems="center" sx={{ p:1.2, bgcolor:C.panel, borderTop:`1px solid ${C.border}` }}>
              {[0,1,2].map(i=>(
                <Box key={i} sx={{ width:58, height:48, border:`2px ${i<photos?'solid':'dashed'} ${i<photos?C.green:'#546E7A'}`,
                  display:'flex', alignItems:'center', justifyContent:'center', color:i<photos?C.green:'#546E7A', flexShrink:0 }}>
                  <Icon sx={{fontSize:22}}>{i<photos?'photo':'add'}</Icon>
                </Box>
              ))}
              <Typography noWrap sx={{ fontSize:14, fontWeight:700, color:C.text, flex:1, textAlign:'center' }}>{photos}/3</Typography>
              <Button onClick={()=>setPhotos(0)} disabled={photos===0||state!==0} startIcon={<Icon>delete</Icon>}
                sx={{ color:C.red, border:`1px solid ${photos>0&&state===0?C.red:'#455A64'}`, height:48, minWidth:96,
                  '&.Mui-disabled':{ color:'#78909C' } }}>CLEAR</Button>
            </Stack>
            <Stack direction="row" spacing={1.2} sx={{ p:1.2, pt:0, bgcolor:C.panel }}>
              <Button onClick={()=>setPhotos(p=>Math.min(3,p+1))} disabled={state!==0||photos>=3} variant="contained"
                startIcon={<Icon>camera_alt</Icon>}
                sx={{ flex:1, height:62, fontSize:17, bgcolor:C.blue, color:'#0c0f11',
                  boxShadow:'inset 0 -4px 0 rgba(0,0,0,.35)', '&.Mui-disabled':{ bgcolor:'#37474F', color:'#90A4AE' } }}>CAPTURE</Button>
              <Button onClick={()=>{ if(photos>0){ goto(1);} }} disabled={state!==0||photos===0} variant="contained"
                startIcon={<Icon>memory</Icon>}
                sx={{ flex:1, height:62, fontSize:17, bgcolor:C.green, color:'#0c0f11',
                  boxShadow:'inset 0 -4px 0 rgba(0,0,0,.35)', '&.Mui-disabled':{ bgcolor:'#37474F', color:'#90A4AE' } }}>ANALYZE</Button>
            </Stack>
          </Paper>

          <Paper variant="outlined" sx={{ flex:1, borderColor:C.border, display:'flex', flexDirection:'column', minWidth:0, overflow:'hidden' }}>
            <Stack direction="row" alignItems="center" spacing={1} sx={{ px:1.5, height:40, bgcolor:'#11161a', flexShrink:0 }}>
              <Icon sx={{ fontSize:18, color:C.dim }}>smart_toy</Icon>
              <Typography noWrap sx={{ fontSize:13, fontWeight:700, letterSpacing:'0.1em', color:C.dim }}>AI PRODUCT SUGGESTION</Typography>
            </Stack>
            {state===0 && (
              <Stack sx={{ flex:1 }} alignItems="center" justifyContent="center" spacing={2}>
                <Icon sx={{ fontSize:64, color:'#455A64' }}>hourglass_empty</Icon>
                <Typography sx={{ fontSize:20, fontWeight:700, color:C.dim }}>Waiting for photos</Typography>
                <Typography sx={{ fontSize:15, color:'#546E7A' }}>Capture at least 1 photo, then press ANALYZE</Typography>
              </Stack>
            )}
            {state===1 && (
              <Stack sx={{ flex:1, p:3 }} alignItems="center" justifyContent="center" spacing={2.5}>
                <CircularProgress size={92} thickness={4} sx={{ color:C.amber }}/>
                <Typography sx={{ fontSize:24, fontWeight:700 }}>AI Analysis in progress…</Typography>
                <Box sx={{ width:'65%' }}><LinearProgress sx={{ height:10, bgcolor:'#3e2f17', '& .MuiLinearProgress-bar':{bgcolor:C.amber} }}/></Box>
                <Chip icon={<Icon sx={{ color:'#0c0f11 !important' }}>front_hand</Icon>} label="CONTROLS LOCKED — DO NOT TOUCH"
                  sx={{ bgcolor:C.amber, color:'#0c0f11', fontWeight:700, fontSize:14, height:40 }}/>
              </Stack>
            )}
            {state===2 && (
              <Stack spacing={1.1} sx={{ flex:1, p:1.5, minHeight:0 }}>
                <VotePanel label="SUGGESTED TITLE" text={SUG.title} big vote={fb.title} onVote={v=>setFb(f=>({...f,title:v}))}/>
                <VotePanel label="SUGGESTED DESCRIPTION" text={SUG.desc} vote={fb.desc} onVote={v=>setFb(f=>({...f,desc:v}))}/>
                <Stack direction="row" spacing={1.1}>
                  {[['storefront','DEPT',SUG.dept],['category','CATEGORY',SUG.cat],['sell','PRICE','$'+SUG.price],['shopping_cart','AI ACTION',SUG.action]].map(([ic,l,v])=>(
                    <Paper key={l} variant="outlined" sx={{ flex:1, px:1.2, py:.8, borderColor:C.border, bgcolor:C.panel2, minWidth:0 }}>
                      <Stack direction="row" spacing={.6} alignItems="center">
                        <Icon sx={{ fontSize:15, color:C.dim }}>{ic}</Icon>
                        <Typography noWrap sx={{ fontSize:11, fontWeight:700, color:C.dim, letterSpacing:'0.1em' }}>{l}</Typography>
                      </Stack>
                      <Typography noWrap sx={{ fontSize: l==='PRICE'?22:16, fontWeight:700, color: l==='PRICE'?C.green:C.text }}>{v}</Typography>
                    </Paper>
                  ))}
                </Stack>
                <Stack direction="row" spacing={1.1} sx={{ mt:'auto !important' }} alignItems="center">
                  <Stack direction="row" spacing={.8} alignItems="center" sx={{ width:170, flexShrink:0 }}>
                    <Icon sx={{ color: fbDone?C.green:C.amber, fontSize:28 }}>{fbDone?'lock_open':'lock'}</Icon>
                    <Typography sx={{ fontSize:12.5, fontWeight:700, color: fbDone?C.green:C.amber, lineHeight:1.25 }}>
                      {fbDone?'UNLOCKED — PICK FINAL ACTION':'LOCKED — RATE TITLE & DESCRIPTION'}
                    </Typography>
                  </Stack>
                  <Button onClick={()=>{setDone(true);setSnack('SENT TO E-COMM — queued for listing, batch #B-0731.');}} disabled={!fbDone||done} variant="contained" startIcon={<Icon>shopping_cart</Icon>}
                    sx={{ flex:1.25, height:60, fontSize:15.5, bgcolor:C.amberDark, color:'#fff', '&.Mui-disabled':{bgcolor:'#37474F', color:'#90A4AE'} }}>SEND TO E-COMM</Button>
                  <Button onClick={()=>{setDone(true);setSnack('TAG PRINTED — attach tag and shelve item.');}} disabled={!fbDone||done} variant="contained" startIcon={<Icon>print</Icon>}
                    sx={{ flex:1, height:60, fontSize:15.5, bgcolor:'#1e88e5', color:'#fff', '&.Mui-disabled':{bgcolor:'#37474F', color:'#90A4AE'} }}>PRINT TAG</Button>
                  <Button onClick={()=>{setDone(true);setSnack('MARKED FOR SALVAGE — route item to salvage bin.');}} disabled={!fbDone||done} variant="outlined" startIcon={<Icon>recycling</Icon>}
                    sx={{ flex:1, height:60, fontSize:15.5, color:C.red, borderColor:C.red, borderWidth:2, '&.Mui-disabled':{color:'#78909C', borderColor:'#455A64'} }}>SALVAGE</Button>
                </Stack>
              </Stack>
            )}
          </Paper>
        </Stack>
        {state===1 && <Box sx={{ position:'absolute', inset:0, zIndex:10, cursor:'not-allowed' }}/>}
        <Snackbar open={!!snack} anchorOrigin={{vertical:'top',horizontal:'center'}}>
          <Alert severity="success" icon={<Icon>check_circle</Icon>} sx={{ fontSize:16, fontWeight:700, alignItems:'center' }}
            action={<Button color="inherit" onClick={()=>goto(0)} startIcon={<Icon>replay</Icon>} sx={{fontWeight:700}}>NEXT ITEM</Button>}>
            {snack}
          </Alert>
        </Snackbar>
      </Box>
      <Stack direction="row" spacing={1} alignItems="center" justifyContent="center" sx={{ py:1.5, bgcolor:'#3a3f44' }}>
        <Typography sx={{ color:'#B0BEC5', fontWeight:700, fontSize:13, letterSpacing:'0.08em', mr:1 }}>DEMO — JUMP TO STATE:</Typography>
        {['1 CAPTURE','2 ANALYZING','3 REVIEW','4 READY FOR ACTION'].map((l,i)=>(
          <Button key={l} onClick={()=>goto(i)} variant="contained" size="small"
            sx={{ minHeight:40, bgcolor:'#546E7A', color:'#fff', '&:hover':{bgcolor:'#607D8B'} }}>{l}</Button>
        ))}
      </Stack>
    </ThemeProvider>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
