<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1366"/>
<title>Prototype 1 — Conveyor Line · AI Pricing Workstation</title>
<link rel="stylesheet" href="vendor/base.css"/>
<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="vendor/material-ui.production.min.js"></script>
<script src="vendor/babel.min.js"></script>
<style>
  .grid-bg {
    background-image: linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
    background-size: 28px 28px;
  }
</style>
</head>
<body>
<div id="app"></div>
<script type="text/babel">
const {
  Box, Paper, Stack, Button, IconButton, Typography, Chip, Alert, Divider,
  LinearProgress, CircularProgress, Icon, ThemeProvider, createTheme, CssBaseline,
  ToggleButtonGroup, ToggleButton, Snackbar
} = MaterialUI;
const { useState, useEffect, useRef } = React;

const C = {
  bg:'#FCFCFC', panel:'#F8FAFC', text:'#111111', border:'rgba(0,0,0,0.12)',
  blue:'#2196f3', green:'#429a45', amber:'#ed6c02', red:'#b94646',
  steel:'#23282d', steelLight:'#2f353b'
};

const theme = createTheme({
  palette: {
    primary:{ main:C.blue }, success:{ main:C.green }, warning:{ main:C.amber },
    error:{ main:C.red }, text:{ primary:C.text }, background:{ default:C.bg }
  },
  typography: { fontFamily:'Roboto, Arial, Helvetica, sans-serif' },
  shape: { borderRadius: 4 },
  components: {
    MuiButton: { styleOverrides: { root: { minHeight:56, fontWeight:700, letterSpacing:'0.04em' } } },
    MuiChip: { styleOverrides: { root: { fontWeight:700, borderRadius:4 } } }
  }
});

const STATES = ['CAPTURE','ANALYZING','REVIEW','ACTION'];
const SUGGESTION = {
  title: "Carhartt Duck Work Jacket — Brown, Men's L",
  desc: "Heavy-duty cotton duck jacket with quilted flannel lining. Light wear on cuffs, zipper fully functional. No stains or tears.",
  dept: "Men's Outerwear", cat: "Work Jackets", price: "48.00", action: "SEND TO E-COMM", confidence: "HIGH"
};

function statusOf(state, photos, fb) {
  if (state===0) return photos>0
    ? { label:'IMAGES CAPTURED', color:C.blue, icon:'photo_library' }
    : { label:'READY', color:C.green, icon:'check_circle' };
  if (state===1) return { label:'ANALYZING', color:C.amber, icon:'memory' };
  if (state===2) return (fb.title && fb.desc)
    ? { label:'READY FOR ACTION', color:C.green, icon:'check_circle' }
    : { label:'FEEDBACK REQUIRED', color:C.amber, icon:'rate_review' };
  return { label:'READY FOR ACTION', color:C.green, icon:'check_circle' };
}

function StatusChip({s}) {
  return (
    <Chip icon={<Icon sx={{color:'#fff !important'}}>{s.icon}</Icon>} label={s.label}
      sx={{ bgcolor:s.color, color:'#fff', height:40, fontSize:16, px:1, '& .MuiChip-label':{px:1.5} }}/>
  );
}

function StepRail({state, fbDone}) {
  const steps = [
    { n:1, label:'CAPTURE ITEM', icon:'camera_alt' },
    { n:2, label:'AI ANALYSIS', icon:'memory' },
    { n:3, label:'REVIEW & FEEDBACK', icon:'rate_review' },
    { n:4, label:'FINAL ACTION', icon:'task_alt' }
  ];
  const active = state===2 && fbDone ? 3 : state;
  return (
    <Stack direction="row" spacing={0} sx={{ height:62, borderBottom:`2px solid ${C.border}`, bgcolor:'#ECEFF1' }}>
      {steps.map((st,i)=>{
        const done = i<active, cur = i===active;
        const bg = cur ? C.blue : done ? C.green : '#CFD8DC';
        const fg = cur||done ? '#fff' : '#546E7A';
        return (
          <Stack key={st.n} direction="row" alignItems="center" spacing={1.5}
            sx={{ flex:1, bgcolor:bg, color:fg, px:2.5, position:'relative',
              clipPath: i<3 ? 'polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%)':'none',
              mr: i<3 ? '-12px' : 0, pl: i>0 ? 4 : 2.5 }}>
            <Box sx={{ width:34, height:34, borderRadius:'4px', border:'2px solid currentColor',
              display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:18, flexShrink:0 }}>
              {done ? <Icon sx={{fontSize:22}}>check</Icon> : st.n}
            </Box>
            <Typography noWrap sx={{ fontWeight:700, fontSize:17, letterSpacing:'0.03em' }}>{st.label}</Typography>
            {cur && <Typography noWrap sx={{ fontSize:13, fontWeight:500, opacity:.9, ml:'auto !important', pr:3 }}>◀ YOU ARE HERE</Typography>}
          </Stack>
        );
      })}
    </Stack>
  );
}

function CameraPanel({state, photos, onCapture, onClear}) {
  const showLive = state===0;
  return (
    <Paper variant="outlined" sx={{ width:470, display:'flex', flexDirection:'column', borderColor:C.border, bgcolor:C.panel, overflow:'hidden' }}>
      <Stack direction="row" alignItems="center" spacing={1} sx={{ px:2, height:48, bgcolor:C.steel, color:'#fff', flexShrink:0 }}>
        <Icon>camera_alt</Icon>
        <Typography noWrap sx={{ fontWeight:700, fontSize:16, letterSpacing:'0.05em' }}>CAMERA — BAY 2</Typography>
        {showLive && <Chip label="● LIVE" size="small" sx={{ ml:'auto !important', bgcolor:C.red, color:'#fff', fontWeight:700 }}/>}
        {!showLive && <Chip label="PREVIEW OFF" size="small" sx={{ ml:'auto !important', bgcolor:'#546E7A', color:'#fff', fontWeight:700 }}/>}
      </Stack>
      <Box className="grid-bg" sx={{ flex:1, bgcolor:'#1c2126', position:'relative', display:'flex', alignItems:'center', justifyContent:'center', minHeight:0 }}>
        {showLive ? (
          <>
            <svg width="240" height="180" viewBox="0 0 240 180">
              <rect x="55" y="45" width="130" height="100" rx="8" fill="#5d4a36" stroke="#8a6f52" strokeWidth="3"/>
              <rect x="95" y="45" width="50" height="100" fill="#4d3c2b"/>
              <rect x="40" y="50" width="22" height="70" rx="8" fill="#5d4a36" stroke="#8a6f52" strokeWidth="3"/>
              <rect x="178" y="50" width="22" height="70" rx="8" fill="#5d4a36" stroke="#8a6f52" strokeWidth="3"/>
              <circle cx="120" cy="70" r="3" fill="#c9b8a0"/><circle cx="120" cy="95" r="3" fill="#c9b8a0"/><circle cx="120" cy="120" r="3" fill="#c9b8a0"/>
            </svg>
            {[['top','left'],['top','right'],['bottom','left'],['bottom','right']].map(([v,h],i)=>(
              <Box key={i} sx={{ position:'absolute', [v]:12, [h]:12, width:32, height:32,
                [`border${v[0].toUpperCase()+v.slice(1)}`]:'3px solid #4FC3F7', [`border${h[0].toUpperCase()+h.slice(1)}`]:'3px solid #4FC3F7' }}/>
            ))}
            <Typography sx={{ position:'absolute', bottom:14, color:'#90A4AE', fontSize:14, fontWeight:500 }}>
              Place item on the pad · center inside the brackets
            </Typography>
          </>
        ) : (
          <Stack alignItems="center" spacing={1} sx={{ color:'#78909C' }}>
            <Icon sx={{ fontSize:56 }}>videocam_off</Icon>
            <Typography sx={{ fontSize:16, fontWeight:500 }}>Camera preview is off during analysis</Typography>
          </Stack>
        )}
      </Box>
      <Stack direction="row" spacing={1} sx={{ p:1.5, bgcolor:'#ECEFF1', borderTop:`1px solid ${C.border}`, flexShrink:0 }} alignItems="center">
        {[0,1,2].map(i=>(
          <Box key={i} sx={{ width:72, height:56, borderRadius:1, border:`2px ${i<photos?'solid':'dashed'} ${i<photos?C.green:'#90A4AE'}`,
            bgcolor:i<photos?'#E8F5E9':'#fff', display:'flex', alignItems:'center', justifyContent:'center', color:i<photos?C.green:'#90A4AE' }}>
            <Icon>{i<photos?'photo':'add_a_photo'}</Icon>
          </Box>
        ))}
        <Typography noWrap sx={{ fontWeight:700, fontSize:15, color:C.text, flex:1, textAlign:'center' }}>{photos}/3 PHOTOS</Typography>
        <Button onClick={onClear} disabled={photos===0||state!==0} color="error" variant="outlined"
          startIcon={<Icon>delete</Icon>} sx={{ minWidth:110, minHeight:56,
            '&.Mui-disabled':{ color:'#78909C', borderColor:'#B0BEC5' } }}>CLEAR</Button>
      </Stack>
      <Box sx={{ p:1.5, pt:0, bgcolor:'#ECEFF1', flexShrink:0 }}>
        <Button fullWidth onClick={onCapture} disabled={state!==0||photos>=3} variant="contained"
          startIcon={<Icon sx={{fontSize:'30px !important'}}>camera_alt</Icon>}
          sx={{ height:64, fontSize:20, bgcolor:C.blue, boxShadow:'0 4px 0 #1769aa',
            '&:active':{ boxShadow:'0 1px 0 #1769aa', transform:'translateY(3px)' },
            '&.Mui-disabled':{ bgcolor:'#CFD8DC', color:'#607D8B', boxShadow:'none' } }}>
          {photos>=3 ? 'PHOTO LIMIT REACHED' : 'CAPTURE PHOTO'}
        </Button>
      </Box>
    </Paper>
  );
}

function FeedbackRow({label, icon, value, vote, onVote, multi}) {
  return (
    <Paper variant="outlined" sx={{ p:1.5, borderColor: vote ? (vote==='up'?C.green:C.red) : C.amber,
      borderWidth:2, bgcolor:'#fff' }}>
      <Stack direction="row" spacing={2} alignItems="center">
        <Box sx={{ flex:1, minWidth:0 }}>
          <Stack direction="row" spacing={1} alignItems="center" sx={{ mb:.5 }}>
            <Icon sx={{ fontSize:20, color:'#546E7A' }}>{icon}</Icon>
            <Typography noWrap sx={{ fontSize:13, fontWeight:700, color:'#546E7A', letterSpacing:'0.08em' }}>{label}</Typography>
            {!vote && <Chip label="NEEDS REVIEW" size="small" sx={{ bgcolor:C.amber, color:'#fff', height:22, fontSize:11 }}/>}
            {vote==='up' && <Chip icon={<Icon sx={{fontSize:'16px !important', color:'#fff !important'}}>thumb_up</Icon>} label="APPROVED" size="small" sx={{ bgcolor:C.green, color:'#fff', height:22, fontSize:11 }}/>}
            {vote==='down' && <Chip icon={<Icon sx={{fontSize:'16px !important', color:'#fff !important'}}>thumb_down</Icon>} label="REJECTED" size="small" sx={{ bgcolor:C.red, color:'#fff', height:22, fontSize:11 }}/>}
          </Stack>
          <Typography noWrap={!multi} sx={{ fontSize: multi?15:18, fontWeight: multi?400:700, color:C.text,
            ...(multi && { display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden' }) }}>
            {value}
          </Typography>
        </Box>
        <ToggleButtonGroup exclusive value={vote} onChange={(e,v)=>v&&onVote(v)} sx={{ flexShrink:0 }}>
          <ToggleButton value="up" aria-label={`Approve ${label}`} sx={{ width:64, height:60,
            '&.Mui-selected':{ bgcolor:C.green, color:'#fff', '&:hover':{bgcolor:C.green} } }}>
            <Icon>thumb_up</Icon>
          </ToggleButton>
          <ToggleButton value="down" aria-label={`Reject ${label}`} sx={{ width:64, height:60,
            '&.Mui-selected':{ bgcolor:C.red, color:'#fff', '&:hover':{bgcolor:C.red} } }}>
            <Icon>thumb_down</Icon>
          </ToggleButton>
        </ToggleButtonGroup>
      </Stack>
    </Paper>
  );
}

function RightPanel({state, photos, fb, setFb, onAnalyze, onAction, done}) {
  const fbDone = fb.title && fb.desc;
  return (
    <Paper variant="outlined" sx={{ flex:1, display:'flex', flexDirection:'column', borderColor:C.border, bgcolor:C.panel, overflow:'hidden', minWidth:0 }}>
      {state===0 && (
        <Stack sx={{ flex:1, p:2.5 }} spacing={2} justifyContent="center">
          <Stack direction="row" spacing={1.5} alignItems="center">
            <Icon sx={{ fontSize:40, color:C.blue }}>inventory_2</Icon>
            <Typography noWrap sx={{ fontSize:24, fontWeight:700 }}>New Item — Station 04</Typography>
          </Stack>
          <Alert severity={photos>0?'success':'info'} icon={<Icon>{photos>0?'check_circle':'info'}</Icon>}
            sx={{ fontSize:16, alignItems:'center', '& .MuiAlert-icon':{fontSize:28} }}>
            {photos>0 ? `${photos} photo${photos>1?'s':''} captured. Add more or press ANALYZE ITEM.` : 'Step 1: Use the camera panel to capture at least 1 photo of the item.'}
          </Alert>
          <Button onClick={onAnalyze} disabled={photos===0} variant="contained"
            startIcon={<Icon sx={{fontSize:'34px !important'}}>memory</Icon>}
            sx={{ height:96, fontSize:26, bgcolor:C.green, boxShadow:'0 5px 0 #2e6b30',
              '&:active':{ boxShadow:'0 1px 0 #2e6b30', transform:'translateY(4px)' },
              '&.Mui-disabled':{ bgcolor:'#CFD8DC', color:'#607D8B', boxShadow:'none' } }}>
            ANALYZE ITEM
          </Button>
          <Typography sx={{ fontSize:15, color:'#546E7A', textAlign:'center', fontWeight:500 }}>
            {photos===0 ? 'ANALYZE is locked until a photo is captured' : 'Sends photos to AI Analysis · about 5 seconds'}
          </Typography>
        </Stack>
      )}
      {state===1 && (
        <Stack sx={{ flex:1, p:3 }} spacing={3} alignItems="center" justifyContent="center">
          <CircularProgress size={88} thickness={4} sx={{ color:C.amber }}/>
          <Typography sx={{ fontSize:26, fontWeight:700 }}>AI Analysis in progress…</Typography>
          <Box sx={{ width:'70%' }}><LinearProgress sx={{ height:10, borderRadius:5, '& .MuiLinearProgress-bar':{bgcolor:C.amber}, bgcolor:'#FFE0B2' }}/></Box>
          <Alert severity="warning" icon={<Icon>front_hand</Icon>} sx={{ fontSize:16, alignItems:'center' }}>
            Do not touch the screen. Suggestion will appear automatically.
          </Alert>
        </Stack>
      )}
      {state>=2 && (
        <Stack sx={{ flex:1, p:2, minHeight:0 }} spacing={1.2}>
          <Stack direction="row" alignItems="center" spacing={1.5}>
            <Icon sx={{ fontSize:30, color:C.green }}>fact_check</Icon>
            <Typography noWrap sx={{ fontSize:20, fontWeight:700 }}>AI Product Suggestion</Typography>
            <Chip label={`CONFIDENCE: ${SUGGESTION.confidence}`} sx={{ ml:'auto !important', bgcolor:'#E8F5E9', color:C.green, border:`1px solid ${C.green}` }}/>
          </Stack>
          <FeedbackRow label="SUGGESTED TITLE" icon="title" value={SUGGESTION.title}
            vote={fb.title} onVote={v=>setFb(f=>({...f, title:v}))}/>
          <FeedbackRow label="SUGGESTED DESCRIPTION" icon="notes" value={SUGGESTION.desc} multi
            vote={fb.desc} onVote={v=>setFb(f=>({...f, desc:v}))}/>
          <Stack direction="row" spacing={1.2}>
            {[['store','DEPARTMENT',SUGGESTION.dept],['category','CATEGORY',SUGGESTION.cat],['sell','PRICE','$'+SUGGESTION.price],['shopping_cart','AI ACTION',SUGGESTION.action]].map(([ic,l,v])=>(
              <Paper key={l} variant="outlined" sx={{ flex:1, p:1.2, borderColor:C.border, minWidth:0, bgcolor:'#fff' }}>
                <Stack direction="row" spacing={.8} alignItems="center">
                  <Icon sx={{ fontSize:18, color:'#546E7A' }}>{ic}</Icon>
                  <Typography noWrap sx={{ fontSize:12, fontWeight:700, color:'#546E7A', letterSpacing:'0.06em' }}>{l}</Typography>
                </Stack>
                <Typography noWrap sx={{ fontSize:17, fontWeight:700, color: l==='PRICE'?C.green:C.text }}>{v}</Typography>
              </Paper>
            ))}
          </Stack>
          <Stack direction="row" spacing={1.2} sx={{ mt:'auto !important' }}>
            <Button onClick={()=>onAction('SEND TO E-COMM')} disabled={!fbDone||done} variant="contained"
              startIcon={<Icon>shopping_cart</Icon>}
              sx={{ flex:1.4, height:64, fontSize:18, bgcolor:C.amber, boxShadow:'0 4px 0 #a64a00',
                '&:active':{ boxShadow:'0 1px 0 #a64a00', transform:'translateY(3px)' },
                '&.Mui-disabled':{ bgcolor:'#CFD8DC', color:'#607D8B', boxShadow:'none' } }}>SEND TO E-COMM</Button>
            <Button onClick={()=>onAction('PRINT TAG')} disabled={!fbDone||done} variant="contained"
              startIcon={<Icon>print</Icon>}
              sx={{ flex:1, height:64, fontSize:18, bgcolor:C.blue, boxShadow:'0 4px 0 #1769aa',
                '&:active':{ boxShadow:'0 1px 0 #1769aa', transform:'translateY(3px)' },
                '&.Mui-disabled':{ bgcolor:'#CFD8DC', color:'#607D8B', boxShadow:'none' } }}>PRINT TAG</Button>
            <Button onClick={()=>onAction('SALVAGE')} disabled={!fbDone||done} variant="outlined"
              startIcon={<Icon>recycling</Icon>}
              sx={{ flex:1, height:64, fontSize:18, color:C.red, borderColor:C.red, borderWidth:2, bgcolor:'#fff',
                '&.Mui-disabled':{ color:'#78909C', borderColor:'#B0BEC5' } }}>SALVAGE</Button>
          </Stack>
          {!fbDone && (
            <Typography noWrap sx={{ fontSize:14, fontWeight:700, color:C.amber, textAlign:'center' }}>
              <Icon sx={{ fontSize:16, verticalAlign:'-3px', mr:.5 }}>lock</Icon>
              Actions unlock after you approve or reject BOTH the title and the description above
            </Typography>
          )}
          {fbDone && !done && (
            <Typography noWrap sx={{ fontSize:14, fontWeight:700, color:C.green, textAlign:'center' }}>
              <Icon sx={{ fontSize:16, verticalAlign:'-3px', mr:.5 }}>check_circle</Icon>
              Feedback recorded — choose the final action for this item
            </Typography>
          )}
        </Stack>
      )}
    </Paper>
  );
}

function App() {
  const [state, setState] = useState(0);
  const [photos, setPhotos] = useState(0);
  const [fb, setFb] = useState({ title:null, desc:null });
  const [snack, setSnack] = useState(null);
  const [done, setDone] = useState(false);
  const timer = useRef(null);

  const goto = (i) => {
    clearTimeout(timer.current); setDone(false); setSnack(null);
    if (i===0) { setState(0); setPhotos(0); setFb({title:null,desc:null}); }
    if (i===1) { setState(1); setPhotos(2); setFb({title:null,desc:null}); timer.current=setTimeout(()=>setState(2),3500); }
    if (i===2) { setState(2); setPhotos(2); setFb({title:null,desc:null}); }
    if (i===3) { setState(2); setPhotos(2); setFb({title:'up',desc:'up'}); }
  };
  const onAnalyze = () => { setState(1); timer.current=setTimeout(()=>setState(2),3500); };
  const onAction = (a) => { setDone(true); setSnack(`${a} — completed. Item logged to batch #B-1142.`); };
  const reset = () => goto(0);
  const s = statusOf(state, photos, fb);
  const fbDone = fb.title && fb.desc;

  return (
    <ThemeProvider theme={theme}>
      <CssBaseline/>
      <Box className="ws-canvas" sx={{ display:'flex', flexDirection:'column' }}>
        <Stack direction="row" alignItems="center" spacing={2} sx={{ height:56, px:2, bgcolor:C.steel, color:'#fff', flexShrink:0 }}>
          <Icon sx={{ fontSize:30, color:'#FFB300' }}>precision_manufacturing</Icon>
          <Typography noWrap sx={{ fontWeight:700, fontSize:19, letterSpacing:'0.08em' }}>AI PRICING WORKSTATION</Typography>
          <Chip label="STATION 04 · BAY 2" size="small" sx={{ bgcolor:C.steelLight, color:'#B0BEC5', fontWeight:700 }}/>
          <Box sx={{ flex:1 }}/>
          <StatusChip s={s}/>
          <Divider orientation="vertical" flexItem sx={{ bgcolor:'rgba(255,255,255,.2)' }}/>
          <Button onClick={reset} startIcon={<Icon>replay</Icon>} sx={{ color:'#fff', minHeight:44, border:'1px solid rgba(255,255,255,.3)' }}>NEW ITEM</Button>
        </Stack>
        <StepRail state={state} fbDone={!!fbDone}/>
        <Stack direction="row" spacing={1.5} sx={{ flex:1, p:1.5, minHeight:0 }}>
          <CameraPanel state={state} photos={photos}
            onCapture={()=>setPhotos(p=>Math.min(3,p+1))} onClear={()=>setPhotos(0)}/>
          <RightPanel state={state} photos={photos} fb={fb} setFb={setFb}
            onAnalyze={onAnalyze} onAction={onAction} done={done}/>
        </Stack>
        {state===1 && <Box sx={{ position:'absolute', inset:0, zIndex:10, cursor:'not-allowed' }}/>}
        <Snackbar open={!!snack} anchorOrigin={{vertical:'top',horizontal:'center'}}>
          <Alert severity="success" icon={<Icon>check_circle</Icon>} sx={{ fontSize:16, fontWeight:700, alignItems:'center' }}
            action={<Button color="inherit" onClick={reset} startIcon={<Icon>replay</Icon>} sx={{ fontWeight:700 }}>NEXT ITEM</Button>}>
            {snack}
          </Alert>
        </Snackbar>
      </Box>
      <Stack direction="row" spacing={1} alignItems="center" justifyContent="center" sx={{ py:1.5, bgcolor:'#3a3f44' }}>
        <Typography sx={{ color:'#B0BEC5', fontWeight:700, fontSize:13, letterSpacing:'0.08em', mr:1 }}>DEMO — JUMP TO STATE:</Typography>
        {['1 CAPTURE','2 ANALYZING','3 REVIEW','4 READY FOR ACTION'].map((l,i)=>(
          <Button key={l} onClick={()=>goto(i)} variant="contained" size="small"
            sx={{ minHeight:40, bgcolor:'#546E7A', '&:hover':{bgcolor:'#607D8B'} }}>{l}</Button>
        ))}
      </Stack>
    </ThemeProvider>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
