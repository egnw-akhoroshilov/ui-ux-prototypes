<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1366"/>
<title>Prototype 4 — Process Ledger · AI Pricing Workstation</title>
<link rel="stylesheet" href="vendor/base.css"/>
<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="vendor/material-ui.production.min.js"></script>
<script src="vendor/babel.min.js"></script>
</head>
<body>
<div id="app"></div>
<script type="text/babel">
const {
  Box, Paper, Stack, Button, Typography, Chip, Alert, Divider,
  LinearProgress, CircularProgress, Icon, ThemeProvider, createTheme, CssBaseline, Snackbar
} = MaterialUI;
const { useState, useRef } = React;

const C = {
  bg:'#ECEFF1', panel:'#FCFCFC', panel2:'#F8FAFC', text:'#111111',
  border:'rgba(0,0,0,0.12)', blue:'#1976d2', green:'#429a45', amber:'#ed6c02', red:'#b94646', head:'#37474F'
};

const theme = createTheme({
  palette: { primary:{main:C.blue}, success:{main:C.green}, warning:{main:C.amber}, error:{main:C.red}, text:{primary:C.text} },
  typography: { fontFamily:'Roboto, Arial, Helvetica, sans-serif' },
  shape: { borderRadius: 3 },
  components: { MuiButton:{ styleOverrides:{ root:{ minHeight:56, fontWeight:700, letterSpacing:'0.04em' } } } }
});

const SUG = {
  title: "Trek 820 Mountain Bike 26\" — Tuned, Rides Well",
  desc: "Steel-frame 21-speed mountain bike. Shifts smoothly, brakes adjusted, tires hold air. Frame scratches consistent with normal use.",
  dept: "Sporting Goods", cat: "Bicycles", price: "95.00", action: "PRINT TAG"
};

function ColHeader({n, icon, label, state}) {
  // state: 'done' | 'active' | 'locked'
  const col = state==='active'?C.blue : state==='done'?C.green : '#78909C';
  return (
    <Stack direction="row" spacing={1.2} alignItems="center"
      sx={{ height:54, px:1.5, bgcolor:col, color:'#fff', flexShrink:0 }}>
      <Box sx={{ width:32, height:32, border:'2px solid #fff', borderRadius:'50%', display:'flex',
        alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:16, flexShrink:0 }}>
        {state==='done'?<Icon sx={{fontSize:20}}>check</Icon>:n}
      </Box>
      <Typography noWrap sx={{ fontWeight:700, fontSize:16, letterSpacing:'0.05em' }}>{label}</Typography>
      <Box sx={{ flex:1 }}/>
      <Icon sx={{ fontSize:22 }}>{state==='locked'?'lock':icon}</Icon>
    </Stack>
  );
}

function Lockout({label, sub}) {
  return (
    <Stack sx={{ flex:1, opacity:.75 }} alignItems="center" justifyContent="center" spacing={1.2}>
      <Icon sx={{ fontSize:52, color:'#90A4AE' }}>lock</Icon>
      <Typography sx={{ fontSize:17, fontWeight:700, color:'#607D8B' }}>{label}</Typography>
      <Typography sx={{ fontSize:14, color:'#78909C', textAlign:'center', px:2 }}>{sub}</Typography>
    </Stack>
  );
}

function VoteCard({label, text, vote, onVote, lines}) {
  const col = vote==='up'?C.green : vote==='down'?C.red : C.amber;
  return (
    <Paper variant="outlined" sx={{ borderColor:col, borderWidth:2, bgcolor:'#fff', p:1.3 }}>
      <Stack direction="row" spacing={1} alignItems="center" sx={{ mb:.5 }}>
        <Typography noWrap sx={{ fontSize:12.5, fontWeight:700, color:'#546E7A', letterSpacing:'0.1em', flex:1, minWidth:0 }}>{label}</Typography>
        <Chip size="small" label={vote==='up'?'APPROVED':vote==='down'?'REJECTED':'RATE THIS'}
          sx={{ bgcolor:col, color:'#fff', fontWeight:700, height:24, fontSize:11.5 }}/>
      </Stack>
      <Typography sx={{ fontSize: lines===1?17:14.5, fontWeight: lines===1?700:400, mb:1,
        display:'-webkit-box', WebkitLineClamp:lines, WebkitBoxOrient:'vertical', overflow:'hidden' }}>{text}</Typography>
      <Stack direction="row" spacing={1}>
        <Button onClick={()=>onVote('up')} fullWidth startIcon={<Icon>thumb_up</Icon>} aria-label={`Approve ${label}`}
          variant={vote==='up'?'contained':'outlined'}
          sx={{ height:56, fontSize:14,
            ...(vote==='up' ? { bgcolor:C.green, '&:hover':{bgcolor:C.green} } : { color:C.green, borderColor:C.green, borderWidth:2 }) }}>GOOD</Button>
        <Button onClick={()=>onVote('down')} fullWidth startIcon={<Icon>thumb_down</Icon>} aria-label={`Reject ${label}`}
          variant={vote==='down'?'contained':'outlined'}
          sx={{ height:56, fontSize:14,
            ...(vote==='down' ? { bgcolor:C.red, '&:hover':{bgcolor:C.red} } : { color:C.red, borderColor:C.red, borderWidth:2 }) }}>BAD</Button>
      </Stack>
    </Paper>
  );
}

function App() {
  const [state, setState] = useState(0);
  const [photos, setPhotos] = useState(0);
  const [fb, setFb] = useState({ title:null, desc:null });
  const [snack, setSnack] = useState(null);
  const [done, setDone] = useState(false);
  const timer = useRef(null);
  const fbDone = fb.title && fb.desc;

  const goto = (i) => {
    clearTimeout(timer.current); setDone(false); setSnack(null);
    if (i===0) { setState(0); setPhotos(0); setFb({title:null,desc:null}); }
    if (i===1) { setState(1); setPhotos(2); setFb({title:null,desc:null}); timer.current=setTimeout(()=>setState(2),3500); }
    if (i===2) { setState(2); setPhotos(2); setFb({title:null,desc:null}); }
    if (i===3) { setState(2); setPhotos(2); setFb({title:'up',desc:'up'}); }
  };
  const status = state===0 ? (photos>0?['IMAGES CAPTURED',C.blue,'photo_library']:['READY',C.green,'check_circle'])
    : state===1 ? ['ANALYZING',C.amber,'memory']
    : fbDone ? ['READY FOR ACTION',C.green,'check_circle'] : ['FEEDBACK REQUIRED',C.amber,'rate_review'];

  const col1 = state===0 ? 'active' : 'done';
  const col2 = state<2 ? (state===1 ? 'active' : 'locked') : 'active';
  const col3 = state===2 && fbDone ? 'active' : 'locked';

  return (
    <ThemeProvider theme={theme}>
      <CssBaseline/>
      <Box className="ws-canvas" sx={{ display:'flex', flexDirection:'column', bgcolor:`${C.bg} !important` }}>
        <Stack direction="row" alignItems="center" spacing={2} sx={{ height:54, px:2, bgcolor:C.head, color:'#fff', flexShrink:0 }}>
          <Icon sx={{ fontSize:28, color:'#FFB300' }}>conveyor_belt</Icon>
          <Typography noWrap sx={{ fontWeight:700, fontSize:18, letterSpacing:'0.08em' }}>ITEM PROCESSING LEDGER</Typography>
          <Chip label="LINE 2 · STATION 11" size="small" sx={{ bgcolor:'rgba(255,255,255,.15)', color:'#CFD8DC', fontWeight:700 }}/>
          <Box sx={{ flex:1 }}/>
          <Typography noWrap sx={{ fontSize:14, color:'#B0BEC5', fontWeight:500 }}>Follow the columns left → right</Typography>
          <Chip icon={<Icon sx={{color:'#fff !important'}}>{status[2]}</Icon>} label={status[0]}
            sx={{ bgcolor:status[1], color:'#fff', height:40, fontSize:15, fontWeight:700 }}/>
          <Button onClick={()=>goto(0)} startIcon={<Icon>replay</Icon>}
            sx={{ color:'#fff', border:'1px solid rgba(255,255,255,.35)', minHeight:42 }}>NEW ITEM</Button>
        </Stack>

        <Stack direction="row" spacing={1.5} sx={{ flex:1, p:1.5, minHeight:0 }}>
          {/* COLUMN 1 — CAPTURE */}
          <Paper variant="outlined" sx={{ flex:1.05, display:'flex', flexDirection:'column', borderColor:C.border, overflow:'hidden', minWidth:0 }}>
            <ColHeader n={1} icon="camera_alt" label="CAPTURE" state={col1}/>
            <Stack sx={{ flex:1, p:1.3, minHeight:0, bgcolor:C.panel2 }} spacing={1.2}>
              <Box sx={{ flex:1, bgcolor:'#1c2126', position:'relative', display:'flex', alignItems:'center', justifyContent:'center', minHeight:0, borderRadius:'3px' }}>
                {state===0 ? (
                  <>
                    <svg width="170" height="120" viewBox="0 0 170 120">
                      <circle cx="45" cy="85" r="24" fill="none" stroke="#5c6f7a" strokeWidth="5"/>
                      <circle cx="125" cy="85" r="24" fill="none" stroke="#5c6f7a" strokeWidth="5"/>
                      <path d="M45 85 L72 40 L112 40 L125 85 L85 85 L72 40 M45 85 L85 85" fill="none" stroke="#5c6f7a" strokeWidth="5" strokeLinejoin="round"/>
                      <path d="M104 32 h18 l3 8" fill="none" stroke="#5c6f7a" strokeWidth="5"/>
                    </svg>
                    <Chip label="● LIVE" size="small" sx={{ position:'absolute', top:8, right:8, bgcolor:C.red, color:'#fff', fontWeight:700, height:24 }}/>
                    <Typography sx={{ position:'absolute', bottom:8, fontSize:12.5, color:'#90A4AE', fontWeight:500 }}>Center item in frame</Typography>
                  </>
                ) : (
                  <Stack alignItems="center" spacing={.8} sx={{ color:'#78909C' }}>
                    <Icon sx={{ fontSize:40 }}>videocam_off</Icon>
                    <Typography sx={{ fontSize:13, fontWeight:500 }}>Preview off</Typography>
                  </Stack>
                )}
              </Box>
              <Stack direction="row" spacing={1} alignItems="center">
                {[0,1,2].map(i=>(
                  <Box key={i} sx={{ flex:1, height:52, border:`2px ${i<photos?'solid':'dashed'} ${i<photos?C.green:'#90A4AE'}`,
                    bgcolor:i<photos?'#E8F5E9':'#fff', display:'flex', alignItems:'center', justifyContent:'center',
                    color:i<photos?C.green:'#90A4AE', borderRadius:'3px' }}>
                    <Icon sx={{fontSize:22}}>{i<photos?'photo':'add_a_photo'}</Icon>
                  </Box>
                ))}
              </Stack>
              <Button onClick={()=>setPhotos(p=>Math.min(3,p+1))} disabled={state!==0||photos>=3} variant="contained"
                startIcon={<Icon sx={{fontSize:'26px !important'}}>camera_alt</Icon>}
                sx={{ height:64, fontSize:18, bgcolor:C.blue, boxShadow:'inset 0 -4px 0 rgba(0,0,0,.25)',
                  '&.Mui-disabled':{ bgcolor:'#CFD8DC', color:'#607D8B' } }}>CAPTURE</Button>
              <Button onClick={()=>{ if(photos>0) goto(1); }} disabled={state!==0||photos===0} variant="contained"
                startIcon={<Icon sx={{fontSize:'26px !important'}}>memory</Icon>}
                sx={{ height:64, fontSize:18, bgcolor:C.green, boxShadow:'inset 0 -4px 0 rgba(0,0,0,.25)',
                  '&.Mui-disabled':{ bgcolor:'#CFD8DC', color:'#607D8B' } }}>ANALYZE →</Button>
            </Stack>
          </Paper>

          {/* COLUMN 2 — AI SUGGESTION + FEEDBACK */}
          <Paper variant="outlined" sx={{ flex:1.6, display:'flex', flexDirection:'column', borderColor:C.border, overflow:'hidden', minWidth:0 }}>
            <ColHeader n={2} icon="rate_review" label="AI SUGGESTION — YOUR REVIEW" state={col2}/>
            {state===0 && <Lockout label="WAITING FOR ANALYSIS" sub="Capture photos in column 1 and press ANALYZE"/>}
            {state===1 && (
              <Stack sx={{ flex:1, p:2, bgcolor:C.panel2 }} alignItems="center" justifyContent="center" spacing={2}>
                <CircularProgress size={76} thickness={4} sx={{ color:C.amber }}/>
                <Typography sx={{ fontSize:20, fontWeight:700 }}>AI Analysis in progress…</Typography>
                <Box sx={{ width:'70%' }}><LinearProgress sx={{ height:10, borderRadius:5, bgcolor:'#FFE0B2', '& .MuiLinearProgress-bar':{bgcolor:C.amber} }}/></Box>
                <Chip icon={<Icon sx={{color:'#fff !important'}}>front_hand</Icon>} label="SCREEN LOCKED"
                  sx={{ bgcolor:C.head, color:'#fff', fontWeight:700, height:38, fontSize:14 }}/>
              </Stack>
            )}
            {state===2 && (
              <Stack spacing={1.1} sx={{ flex:1, p:1.3, minHeight:0, bgcolor:C.panel2 }}>
                <VoteCard label="SUGGESTED TITLE" text={SUG.title} lines={1} vote={fb.title} onVote={v=>setFb(f=>({...f,title:v}))}/>
                <VoteCard label="SUGGESTED DESCRIPTION" text={SUG.desc} lines={2} vote={fb.desc} onVote={v=>setFb(f=>({...f,desc:v}))}/>
                <Alert severity={fbDone?'success':'warning'} icon={<Icon>{fbDone?'check_circle':'arrow_upward'}</Icon>}
                  sx={{ fontSize:14, alignItems:'center', mt:'auto !important' }}>
                  {fbDone ? 'Feedback complete — column 3 is unlocked.' : 'Rate BOTH the title and description to unlock column 3.'}
                </Alert>
              </Stack>
            )}
          </Paper>

          {/* COLUMN 3 — DECISION */}
          <Paper variant="outlined" sx={{ flex:1.05, display:'flex', flexDirection:'column', borderColor:C.border, overflow:'hidden', minWidth:0 }}>
            <ColHeader n={3} icon="task_alt" label="FINAL DECISION" state={col3}/>
            {state<2 && <Lockout label="LOCKED" sub="Unlocks after AI analysis and your review in column 2"/>}
            {state===2 && (
              <Stack spacing={1.1} sx={{ flex:1, p:1.3, minHeight:0, bgcolor:C.panel2 }}>
                <Stack direction="row" spacing={1.1}>
                  <Paper variant="outlined" sx={{ flex:1, p:1.1, borderColor:C.border, bgcolor:'#fff', minWidth:0 }}>
                    <Typography noWrap sx={{ fontSize:11.5, fontWeight:700, color:'#546E7A', letterSpacing:'0.08em' }}>DEPT / CATEGORY</Typography>
                    <Typography noWrap sx={{ fontSize:15, fontWeight:700 }}>{SUG.dept}</Typography>
                    <Typography noWrap sx={{ fontSize:13.5, color:'#546E7A' }}>{SUG.cat}</Typography>
                  </Paper>
                  <Paper variant="outlined" sx={{ width:118, p:1.1, borderColor:C.green, borderWidth:2, bgcolor:'#F1F8E9', flexShrink:0 }}>
                    <Typography noWrap sx={{ fontSize:11.5, fontWeight:700, color:'#546E7A', letterSpacing:'0.08em' }}>AI PRICE</Typography>
                    <Typography noWrap sx={{ fontSize:26, fontWeight:700, color:C.green }}>${SUG.price}</Typography>
                  </Paper>
                </Stack>
                <Stack direction="row" spacing={.8} alignItems="center">
                  <Icon sx={{ fontSize:18, color:C.amber }}>recommend</Icon>
                  <Typography noWrap sx={{ fontSize:13.5, fontWeight:700, color:'#546E7A' }}>AI RECOMMENDS: <Box component="span" sx={{ color:C.amber }}>{SUG.action}</Box></Typography>
                </Stack>
                <Divider/>
                <Button onClick={()=>{setDone(true);setSnack('SENT TO E-COMM — listing queued, batch #B-0918.');}} disabled={!fbDone||done} variant="contained" startIcon={<Icon>shopping_cart</Icon>}
                  sx={{ height:58, fontSize:15.5, bgcolor:C.amber, '&.Mui-disabled':{bgcolor:'#CFD8DC',color:'#607D8B'} }}>SEND TO E-COMM</Button>
                <Button onClick={()=>{setDone(true);setSnack('TAG PRINTED — attach tag and shelve item.');}} disabled={!fbDone||done} variant="contained" startIcon={<Icon>print</Icon>}
                  sx={{ height:58, fontSize:15.5, bgcolor:C.blue, border: SUG.action==='PRINT TAG'?'3px solid #0d47a1':'none',
                    '&.Mui-disabled':{bgcolor:'#CFD8DC',color:'#607D8B'} }}>PRINT TAG ★ AI PICK</Button>
                <Button onClick={()=>{setDone(true);setSnack('MARKED FOR SALVAGE — route to salvage bin.');}} disabled={!fbDone||done} variant="outlined" startIcon={<Icon>recycling</Icon>}
                  sx={{ height:58, fontSize:15.5, color:C.red, borderColor:C.red, borderWidth:2, bgcolor:'#fff',
                    '&.Mui-disabled':{color:'#78909C', borderColor:'#B0BEC5'} }}>SALVAGE</Button>
                {!fbDone && (
                  <Typography noWrap sx={{ fontSize:12.5, fontWeight:700, color:C.amber, textAlign:'center' }}>
                    <Icon sx={{ fontSize:14, verticalAlign:'-2px', mr:.4 }}>lock</Icon>BUTTONS LOCKED — FINISH COLUMN 2 REVIEW
                  </Typography>
                )}
              </Stack>
            )}
          </Paper>
        </Stack>
        {state===1 && <Box sx={{ position:'absolute', inset:0, zIndex:10, cursor:'not-allowed' }}/>}
        <Snackbar open={!!snack} anchorOrigin={{vertical:'top',horizontal:'center'}}>
          <Alert severity="success" icon={<Icon>check_circle</Icon>} sx={{ fontSize:16, fontWeight:700, alignItems:'center' }}
            action={<Button color="inherit" onClick={()=>goto(0)} startIcon={<Icon>replay</Icon>} sx={{fontWeight:700}}>NEXT ITEM</Button>}>
            {snack}
          </Alert>
        </Snackbar>
      </Box>
      <Stack direction="row" spacing={1} alignItems="center" justifyContent="center" sx={{ py:1.5, bgcolor:'#3a3f44' }}>
        <Typography sx={{ color:'#B0BEC5', fontWeight:700, fontSize:13, letterSpacing:'0.08em', mr:1 }}>DEMO — JUMP TO STATE:</Typography>
        {['1 CAPTURE','2 ANALYZING','3 REVIEW','4 READY FOR ACTION'].map((l,i)=>(
          <Button key={l} onClick={()=>goto(i)} variant="contained" size="small"
            sx={{ minHeight:40, bgcolor:'#546E7A', '&:hover':{bgcolor:'#607D8B'} }}>{l}</Button>
        ))}
      </Stack>
    </ThemeProvider>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
